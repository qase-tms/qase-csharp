name: C# CI

on:
  push:
  pull_request:
    branches:
      - 'main'

env:
  NUGET_DIR: ./nuget

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test Qase.Csharp.Commons.Tests && \
          dotnet test Qase.NUnit.Reporter.Tests && \
          dotnet test Qase.MSTest.Reporter.Tests && \
          dotnet test Qase.XUnit.Reporter.Tests && \
          dotnet test Qase.XUnit.V3.Reporter.Tests && \
          dotnet test Qase.Reqnroll.Reporter.Tests
 
  integration-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reporters-validator
        run: pip install git+https://github.com/qase-tms/reporters-validator.git

      - name: Download report schemas
        run: git clone --depth 1 https://github.com/qase-tms/specs.git /tmp/specs

      - name: Build
        run: dotnet build

      - name: Validate NUnit
        run: |
          QASE_MODE=report dotnet test examples/NUnitExamples/ || true
          reporters-validator validate \
            --report-dir examples/NUnitExamples/bin/Debug/net10.0/build/qase-report \
            --expected expected/nunit-examples.yaml \
            --schema-dir /tmp/specs/report/schemas

      - name: Validate xUnit
        run: |
          QASE_MODE=report dotnet test examples/xUnitExamples/ || true
          reporters-validator validate \
            --report-dir examples/xUnitExamples/bin/Debug/net10.0/build/qase-report \
            --expected expected/xunit-examples.yaml \
            --schema-dir /tmp/specs/report/schemas

      - name: Validate MSTest
        run: |
          QASE_MODE=report dotnet test examples/MSTestExamples/MSTestExamples.csproj || true
          reporters-validator validate \
            --report-dir examples/MSTestExamples/build/qase-report \
            --expected expected/mstest-examples.yaml \
            --schema-dir /tmp/specs/report/schemas

      - name: Validate xUnit V3
        run: |
          cd examples/xUnitV3Examples
          QASE_MODE=report dotnet test --project xUnitV3Examples.csproj || true
          cd ../..
          reporters-validator validate \
            --report-dir examples/xUnitV3Examples/build/qase-report \
            --expected expected/xunit-v3-examples.yaml \
            --schema-dir /tmp/specs/report/schemas

      - name: Validate Reqnroll
        run: |
          QASE_MODE=report dotnet test examples/ReqnrollExamples/ || true
          reporters-validator validate \
            --report-dir examples/ReqnrollExamples/bin/Debug/net10.0/build/qase-report \
            --expected expected/reqnroll-examples.yaml \
            --schema-dir /tmp/specs/report/schemas

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: test
    if: startsWith(github.event.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Create NuGet package
        run: dotnet pack --configuration Release --no-build --output ${{ env.NUGET_DIR }} --include-symbols

      - name: Publish NuGet package
        run: |
          dotnet nuget push "${{ env.NUGET_DIR }}/*.nupkg" \
          --skip-duplicate \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
